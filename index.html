<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Quick Debts">
    
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056D2">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quick Debts</title>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="tabs">
    <button class="tab-btn active" data-target="view-home">Home</button>
    <button class="tab-btn" data-target="view-cadastro">Nova Dívida</button>
    <button class="tab-btn" data-target="view-lista">A Receber</button>
  </nav>

  <div id="view-home" class="view-container active">
    
    <div class="dashboard-grid">
      <div class="dash-card col-full balance-card">
        <span class="dash-label">Saldo Atual (Cofre)</span>
        <h2 id="saldo-atual">R$ 0,00</h2>
        <span class="dash-forecast">Previsão (até dia 4): <strong id="saldo-previsto">R$ 0,00</strong></span>
      </div>
      
      <div class="dash-card nu-card">
        <span class="dash-label">Dívida Nubank</span>
        <h3 id="divida-nu">R$ 0,00</h3>
        <button class="btn-edit-card" onclick="editarDividaCartao('nubank')">✏️ Ajustar</button>
      </div>

      <div class="dash-card mp-card">
        <span class="dash-label">Dívida Merc. Pago</span>
        <h3 id="divida-mp">R$ 0,00</h3>
        <button class="btn-edit-card" onclick="editarDividaCartao('mercadoPago')">✏️ Ajustar</button>
      </div>
    </div>

    <header style="margin-top: 32px;">
      <h2>Registrar Transação</h2>
    </header>
    <form id="form-transacao" class="minimal-form">
      <fieldset class="quick-select" style="margin-bottom: 12px;">
        <label><input type="radio" name="trans-tipo" value="entrada" checked><span style="color:#2E7D32;">+ Entrada</span></label>
        <label><input type="radio" name="trans-tipo" value="saida"><span style="color:#D32F2F;">- Saída</span></label>
      </fieldset>

      <div class="input-group">
        <label>Valor e Data</label>
        <div style="display: flex; gap: 8px;">
          <input type="text" id="trans-valor" inputmode="numeric" placeholder="R$ 0,00" required style="flex: 2;">
          <input type="date" id="trans-data" required style="flex: 1;" class="input-custom" style="margin-bottom:0;">
        </div>
      </div>

      <fieldset class="quick-select">
        <legend>Conta / Cartão</legend>
        <label><input type="radio" name="trans-conta" value="Cofre pessoal" checked><span>Cofre</span></label>
        <label><input type="radio" name="trans-conta" value="Nubank"><span>Nubank</span></label>
        <label><input type="radio" name="trans-conta" value="Mercado Pago"><span>Merc. Pago</span></label>
      </fieldset>

      <div class="input-group">
        <input type="text" id="trans-desc" placeholder="Descrição (Ex: Lanche, Salário)..." class="input-custom" required>
      </div>

      <button type="submit" class="btn-primary">Registrar</button>
    </form>

    <header style="margin-top: 32px;">
      <h3>Últimas Transações</h3>
    </header>
    <ul id="lista-transacoes" class="installment-list">
      </ul>
  </div>

  <div id="view-cadastro" class="view-container hidden">
    <header><h2>Nova Dívida a Receber</h2></header>
    <form id="form-divida" class="minimal-form">
      <fieldset class="quick-select" style="margin-bottom: 8px;">
        <label><input type="radio" name="tipo-valor" value="total" checked><span>Valor Total</span></label>
        <label><input type="radio" name="tipo-valor" value="parcela"><span>Valor da Parcela</span></label>
      </fieldset>

      <div class="input-group">
        <label for="valor">Valor</label>
        <input type="text" id="valor" inputmode="numeric" placeholder="R$ 0,00" required>
      </div>

      <div class="input-group">
        <label for="devedor">Quem está devendo?</label>
        <div class="contact-wrapper">
          <input list="lista-contatos" id="devedor" placeholder="Digite ou selecione" autocomplete="off" required>
          <datalist id="lista-contatos"></datalist>
          <button type="button" id="btn-salvar-contato" class="btn-small hidden">+ Salvar Contato</button>
        </div>
      </div>

      <fieldset class="quick-select" id="grupo-motivo">
        <legend>Motivo</legend>
        <label><input type="radio" name="motivo" value="Racha" checked><span>Racha</span></label>
        <label><input type="radio" name="motivo" value="Cartão"><span>Cartão</span></label>
        <label><input type="radio" name="motivo" value="Empréstimo"><span>Empréstimo</span></label>
        <label><input type="radio" name="motivo" value="outro" id="radio-outro"><span>+</span></label>
      </fieldset>
      
      <div id="container-motivo-custom" class="hidden" style="margin-bottom: 20px;">
        <div class="contact-wrapper">
          <input list="lista-motivos" id="motivo-custom" placeholder="Digite o novo motivo" class="input-custom" autocomplete="off" style="margin-bottom: 0;">
          <datalist id="lista-motivos"></datalist>
          <button type="button" id="btn-salvar-motivo" class="btn-small hidden">+ Salvar Motivo</button>
        </div>
      </div>

      <div class="input-group">
        <label for="data-ocorrencia">Quando aconteceu?</label>
        <input type="date" id="data-ocorrencia" class="input-custom" style="margin-bottom: 8px;">
      </div>

      <div class="input-group">
        <textarea id="detalhes-motivo" rows="2" placeholder="Adicione detalhes (Opcional)..."></textarea>
      </div>

      <fieldset class="quick-select">
        <legend>Origem do Dinheiro</legend>
        <label><input type="radio" name="origem" value="Cofre pessoal" checked><span>Cofre Pessoal</span></label>
        <label><input type="radio" name="origem" value="Nubank"><span>Nubank</span></label>
        <label><input type="radio" name="origem" value="Mercado Pago"><span>Mercado Pago</span></label>
      </fieldset>

      <fieldset class="quick-select" id="grupo-parcelas">
        <legend>Parcelas</legend>
        <label><input type="radio" name="parcelas" value="1" checked><span>À vista</span></label>
        <label><input type="radio" name="parcelas" value="2"><span>2x</span></label>
        <label><input type="radio" name="parcelas" value="3"><span>3x</span></label>
        <label><input type="radio" name="parcelas" value="custom"><span>Outro</span></label>
      </fieldset>
      
      <input type="number" id="qtd-parcelas-custom" class="hidden input-custom" placeholder="Nº de parcelas" min="1">

      <div class="custom-date-group">
        <label class="toggle-label"><input type="checkbox" id="toggle-data-custom">Definir data da 1ª parcela</label>
        <input type="date" id="data-primeira-parcela" class="hidden input-custom">
      </div>

      <button type="submit" class="btn-primary">Registrar Dívida</button>
    </form>
  </div>

  <div id="view-lista" class="view-container hidden">
    <header><h2>Dívidas Ativas</h2></header>
    <div class="filter-section minimal-form">
      <fieldset class="quick-select" style="margin-bottom: 12px;">
        <label><input type="radio" name="filtro-tipo" value="pessoa" checked><span>Por Pessoa</span></label>
        <label><input type="radio" name="filtro-tipo" value="mes"><span>Por Mês</span></label>
      </fieldset>
      <div id="filtro-pessoa-container" class="input-group" style="margin-bottom: 0;">
        <input list="lista-contatos" id="filtro-pessoa" placeholder="Buscar devedor..." autocomplete="off">
      </div>
      <div id="filtro-mes-container" class="input-group hidden" style="margin-bottom: 0;">
        <input type="month" id="filtro-mes" class="input-custom" style="margin-bottom: 0;">
      </div>
    </div>
    <div id="lista-dividas-container"></div>
  </div>

  <script src="debts.js" defer></script>
</body>
</html>
